<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>발주 체크리스트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { min-height: 100vh; background: #f0ede8; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }

/* Header */
.header { background: #1a1a1a; color: #f5f0e8; padding: 20px 16px 16px; }
.header-label { font-size: 10px; letter-spacing: 0.3em; color: #666; text-transform: uppercase; margin-bottom: 4px; }
.header h1 { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
.header-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
#supplierInput {
background: transparent; border: none; border-bottom: 1px solid #444;
color: #f5f0e8; font-size: 14px; padding: 4px 0; flex: 1; outline: none; min-width: 120px;
}
#supplierInput::placeholder { color: #555; }
#dateInput {
background: transparent; border: 1px solid #444; color: #f5f0e8;
padding: 5px 8px; border-radius: 4px; font-size: 12px; outline: none;
}
.progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-bottom: 5px; }
#progressText { color: #aaa; }
.progress-bar { background: #333; border-radius: 2px; height: 3px; }
#progressFill { height: 100%; background: #c8a96e; width: 0%; border-radius: 2px; transition: width 0.4s; }

/* Tabs */
.tabs { display: flex; background: #fff; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 10; }
.tab { flex: 1; padding: 13px; text-align: center; font-size: 13px; font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab.active { color: #1a1a1a; border-bottom-color: #c8a96e; }

/* Sections */
.section { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
.section.active { display: block; }

/* 상품 DB */
.db-search { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; margin-bottom: 12px; background: #fff; }
.db-category { margin-bottom: 16px; }
.db-category-title { font-size: 11px; color: #888; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; padding-left: 2px; }
.db-items { display: flex; flex-wrap: wrap; gap: 8px; }
.db-item {
display: flex; align-items: center; gap: 6px;
background: #fff; border: 1.5px solid #e0e0e0; border-radius: 20px;
padding: 6px 12px; cursor: pointer; font-size: 13px; color: #333;
transition: all 0.15s; user-select: none;
}
.db-item.selected { background: #1a1a1a; color: #f5f0e8; border-color: #1a1a1a; }
.db-item .unit-badge { font-size: 10px; color: #aaa; }
.db-item.selected .unit-badge { color: #888; }

/* Add new product */
.add-product-btn { width: 100%; padding: 12px; border: 1.5px dashed #c8a96e; border-radius: 8px; background: transparent; color: #c8a96e; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
.add-product-form { background: #fff; border-radius: 8px; padding: 14px; margin-top: 8px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.add-product-form.visible { display: block; }
.form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.form-input { flex: 1; min-width: 80px; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 13px; outline: none; }
.form-select { border: 1px solid #ddd; border-radius: 6px; padding: 8px 6px; font-size: 13px; outline: none; }
.form-submit { width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* 발주 목록 */
.order-empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
.order-empty span { display: block; font-size: 32px; margin-bottom: 10px; }

.order-item {
background: #fff; border-radius: 10px; padding: 12px 14px;
margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.order-item.done { background: #f0f8f0; }
.check-btn {
width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd;
display: flex; align-items: center; justify-content: center;
cursor: pointer; flex-shrink: 0; font-size: 12px; color: transparent;
transition: all 0.2s;
}
.check-btn.checked { background: #4caf50; border-color: #4caf50; color: #fff; }
.order-item-name { flex: 1; font-size: 15px; font-weight: 600; color: #1a1a1a; }
.order-item.done .order-item-name { color: #aaa; text-decoration: line-through; }
.qty-control { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ddd; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; flex-shrink: 0; }
.qty-input { width: 36px; text-align: center; border: none; outline: none; font-size: 15px; font-weight: 700; color: #1a1a1a; background: transparent; }
.unit-label { font-size: 12px; color: #888; flex-shrink: 0; }
.del-order-btn { color: #ddd; font-size: 18px; cursor: pointer; background: none; border: none; padding: 0 2px; flex-shrink: 0; }

/* Summary & Copy */
.summary-bar {
background: #fff; border-radius: 10px; padding: 14px 16px;
margin-bottom: 12px; display: flex; justify-content: space-around;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.summary-item { text-align: center; }
.summary-num { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.summary-num.gold { color: #c8a96e; }
.summary-num.green { color: #4caf50; }
.summary-label { font-size: 10px; color: #aaa; margin-top: 2px; }

.copy-btn {
width: 100%; background: #1a1a1a; color: #f5f0e8; border: none;
border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700;
cursor: pointer; margin-bottom: 10px; letter-spacing: 0.05em;
transition: background 0.2s;
}
.copy-btn.copied { background: #4caf50; }

.copy-preview {
background: #fff; border-radius: 10px; padding: 14px 16px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 12px;
}
.copy-preview-title { font-size: 10px; color: #aaa; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
.copy-preview-text { font-size: 14px; color: #333; line-height: 2; white-space: pre-line; }

/* Toast */
.toast {
position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px;
font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>
<body>

<div class="header">
  <div class="header-label">Restaurant Order</div>
  <h1>발주 체크리스트</h1>
  <div class="header-meta">
    <input type="text" id="supplierInput" placeholder="공급업체 입력">
    <input type="date" id="dateInput">
  </div>
  <div class="progress-labels"><span>발주 진행</span><span id="progressText">0 / 0개</span></div>
  <div class="progress-bar"><div id="progressFill"></div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('order')">📋 발주 목록</div>
  <div class="tab" onclick="switchTab('db')">🗂 상품 관리</div>
</div>

<!-- 발주 목록 -->

<div class="section active" id="tab-order">
  <div class="summary-bar">
    <div class="summary-item"><div class="summary-num gold" id="s-total">0</div><div class="summary-label">전체</div></div>
    <div class="summary-item"><div class="summary-num green" id="s-done">0</div><div class="summary-label">완료</div></div>
    <div class="summary-item"><div class="summary-num" id="s-remain">0</div><div class="summary-label">미완료</div></div>
  </div>

  <div class="copy-preview">
    <div class="copy-preview-title">발주 내용 미리보기</div>
    <div class="copy-preview-text" id="previewText">— 상품 관리에서 품목을 선택하세요 —</div>
  </div>
  <button class="copy-btn" id="copyBtn" onclick="copyOrder()">📋 발주 내용 복사하기</button>

  <div id="orderList"></div>
</div>

<!-- 상품 DB -->

<div class="section" id="tab-db">
  <input type="text" class="db-search" id="dbSearch" placeholder="🔍 품목 검색..." oninput="renderDB()">
  <div id="dbList"></div>

<button class="add-product-btn" onclick="toggleAddForm()">+ 새 품목 등록</button>

  <div class="add-product-form" id="addProductForm">
    <div class="form-row">
      <input type="text" class="form-input" id="newProductName" placeholder="품목명 (예: 양배추)">
      <input type="text" class="form-input" id="newProductUnit" placeholder="단위 (예: 망)">
    </div>
    <div class="form-row">
      <select class="form-select" id="newProductCategory">
        <option>채소</option><option>과일</option><option>육류</option>
        <option>수산물</option><option>유제품</option><option>양념/소스</option>
        <option>곡류</option><option>기타</option>
      </select>
    </div>
    <button class="form-submit" onclick="addProduct()">등록하기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// 기본 상품 DB
let products = [
  {id:1, name:'양파', unit:'kg', category:'채소'},
  {id:2, name:'감자', unit:'kg', category:'채소'},
  {id:3, name:'당근', unit:'kg', category:'채소'},
  {id:4, name:'대파', unit:'단', category:'채소'},
  {id:5, name:'마늘', unit:'kg', category:'채소'},
  {id:6, name:'고추', unit:'개', category:'채소'},
  {id:7, name:'양배추', unit:'망', category:'채소'},
  {id:8, name:'가지', unit:'개', category:'채소'},
  {id:9, name:'단호박', unit:'통', category:'채소'},
  {id:10, name:'브로콜리', unit:'개', category:'채소'},
  {id:11, name:'시금치', unit:'단', category:'채소'},
  {id:12, name:'깻잎', unit:'단', category:'채소'},
  {id:13, name:'애호박', unit:'개', category:'채소'},
  {id:14, name:'무', unit:'개', category:'채소'},
  {id:15, name:'배추', unit:'포기', category:'채소'},
  {id:16, name:'돼지고기', unit:'kg', category:'육류'},
  {id:17, name:'소고기', unit:'kg', category:'육류'},
  {id:18, name:'닭고기', unit:'kg', category:'육류'},
  {id:19, name:'계란', unit:'판', category:'유제품'},
  {id:20, name:'두부', unit:'모', category:'기타'},
  {id:21, name:'쌀', unit:'kg', category:'곡류'},
];

// 발주 목록 (선택된 품목 + 수량)
let orderItems = []; // {productId, qty}

let nextProductId = 100;

document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='order')||(i===1&&tab==='db')));
  document.getElementById('tab-order').classList.toggle('active', tab==='order');
  document.getElementById('tab-db').classList.toggle('active', tab==='db');
  if(tab==='db') renderDB();
}

// ── 상품 DB ──
function renderDB() {
  const q = document.getElementById('dbSearch').value.trim().toLowerCase();
  const categories = [...new Set(products.map(p=>p.category))];
  const container = document.getElementById('dbList');
  container.innerHTML = '';

  categories.forEach(cat => {
    const filtered = products.filter(p => p.category===cat && (!q || p.name.includes(q)));
    if (!filtered.length) return;
    const div = document.createElement('div');
    div.className = 'db-category';
    div.innerHTML = `<div class="db-category-title">${cat}</div><div class="db-items" id="cat-${cat}"></div>`;
    container.appendChild(div);
    const itemsEl = div.querySelector('.db-items');
    filtered.forEach(p => {
      const isSelected = orderItems.some(o => o.productId === p.id);
      const el = document.createElement('div');
      el.className = 'db-item' + (isSelected ? ' selected' : '');
      el.innerHTML = `${p.name} <span class="unit-badge">${p.unit}</span>`;
      el.onclick = () => toggleProduct(p.id);
      itemsEl.appendChild(el);
    });
  });
}

function toggleProduct(productId) {
  const idx = orderItems.findIndex(o => o.productId === productId);
  if (idx >= 0) {
    orderItems.splice(idx, 1);
    showToast('목록에서 제거했어요');
  } else {
    orderItems.push({ productId, qty: 1, done: false });
    showToast('발주 목록에 추가했어요 ✓');
  }
  renderDB();
  renderOrder();
}

function toggleAddForm() {
  document.getElementById('addProductForm').classList.toggle('visible');
}

function addProduct() {
  const name = document.getElementById('newProductName').value.trim();
  const unit = document.getElementById('newProductUnit').value.trim();
  const category = document.getElementById('newProductCategory').value;
  if (!name || !unit) { showToast('품목명과 단위를 입력해주세요'); return; }
  products.push({ id: nextProductId++, name, unit, category });
  document.getElementById('newProductName').value = '';
  document.getElementById('newProductUnit').value = '';
  document.getElementById('addProductForm').classList.remove('visible');
  showToast(`'${name}' 등록 완료!`);
  renderDB();
}

// ── 발주 목록 ──
function renderOrder() {
  const list = document.getElementById('orderList');
  list.innerHTML = '';

  if (!orderItems.length) {
    list.innerHTML = '<div class="order-empty"><span>🛒</span>상품 관리 탭에서<br>발주할 품목을 선택하세요</div>';
    updateSummary();
    updatePreview();
    return;
  }

  orderItems.forEach(o => {
    const p = products.find(x => x.id === o.productId);
    if (!p) return;
    const div = document.createElement('div');
    div.className = 'order-item' + (o.done ? ' done' : '');
    div.innerHTML = `
      <div class="check-btn ${o.done?'checked':''}" onclick="toggleDone(${o.productId})">${o.done?'✓':''}</div>
      <div class="order-item-name">${p.name}</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(${o.productId},-1)">−</button>
        <input class="qty-input" type="number" min="1" value="${o.qty}" onchange="setQty(${o.productId},this.value)">
        <button class="qty-btn" onclick="changeQty(${o.productId},1)">+</button>
      </div>
      <div class="unit-label">${p.unit}</div>
      <button class="del-order-btn" onclick="removeOrder(${o.productId})">×</button>
    `;
    list.appendChild(div);
  });

  updateSummary();
  updatePreview();
}

function toggleDone(productId) {
  const o = orderItems.find(x => x.productId === productId);
  if (o) { o.done = !o.done; renderOrder(); }
}

function changeQty(productId, delta) {
  const o = orderItems.find(x => x.productId === productId);
  if (o) { o.qty = Math.max(1, (o.qty || 1) + delta); renderOrder(); }
}

function setQty(productId, val) {
  const o = orderItems.find(x => x.productId === productId);
  if (o) { o.qty = Math.max(1, parseInt(val) || 1); renderOrder(); }
}

function removeOrder(productId) {
  orderItems = orderItems.filter(x => x.productId !== productId);
  renderOrder();
  renderDB();
}

function updateSummary() {
  const total = orderItems.length;
  const done = orderItems.filter(o => o.done).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-remain').textContent = total - done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressFill').style.background = pct===100 ? '#4caf50' : '#c8a96e';
  document.getElementById('progressText').textContent = `${done} / ${total}개`;
}

function updatePreview() {
  const preview = document.getElementById('previewText');
  if (!orderItems.length) {
    preview.textContent = '— 상품 관리에서 품목을 선택하세요 —';
    return;
  }
  const supplier = document.getElementById('supplierInput').value;
  const date = document.getElementById('dateInput').value;
  let lines = [];
  if (supplier || date) lines.push(`[${date}${supplier?' / '+supplier:''}]`);
  orderItems.forEach(o => {
    const p = products.find(x => x.id === o.productId);
    if (p) lines.push(`${p.name} ${o.qty}${p.unit}`);
  });
  preview.textContent = lines.join('\n');
}

function copyOrder() {
  const text = document.getElementById('previewText').textContent;
  if (!orderItems.length) { showToast('발주 품목이 없어요'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ 복사 완료!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 발주 내용 복사하기'; btn.classList.remove('copied'); }, 2000);
      showToast('클립보드에 복사됐어요!');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('복사됐어요!');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 날짜/업체 변경시 미리보기 갱신
document.getElementById('supplierInput').addEventListener('input', updatePreview);
document.getElementById('dateInput').addEventListener('change', updatePreview);

renderOrder();
renderDB();
</script>

</body>
</html>
